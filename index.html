            display: none;
            box-shadow: 0 4px 15px rgba(196, 113, 237, 0.4);

        }
        .watch-btn:hover {

        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }

        .particle {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            z-index: 99;
            font-size: 24px;
            animation: fly 1.2s ease-out forwards;
        }
        @keyframes fly {

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.06);
        }
        function playWin() {
            let notes = [440, 554, 659, 880];
            notes.forEach((freq, index) => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + index * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + index * 0.1 + 0.3);
                osc.start(audioCtx.currentTime + index * 0.1); osc.stop(audioCtx.currentTime + index * 0.1 + 0.3);
            });
        }

            const emojis = ['🍿', '✨', '🎬', '🔥', '🎉'];

                let p = document.createElement('div');
                p.className = 'particle';
                p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.setProperty('--mx', (Math.random() * 400 - 200) + 'px');
                p.style.setProperty('--my', (Math.random() * 400 - 200) + 'px');
                p.style.setProperty('--mr', (Math.random() * 360) + 'deg');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1200);
            }
        }

        const resultDiv = document.getElementById('result');
        const rankDiv = document.getElementById('rank');
        const counterSpan = document.getElementById('counter-num');
        const spinBtn = document.getElementById('spin-btn');
        const watchLink = document.getElementById('watch-link');
        const mainCard = document.getElementById('main-card');

        function spin() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            watchLink.style.display = "none";
            
            if (movieTitles.length === 0) {
                alert("تم سحب جميع الأفلام! إعادة تصفير القائمة.");
                location.reload();
                return;
            }

            spinBtn.disabled = true;
            let clicks = 0;
            let duration = 20;
            
            let interval = setInterval(() => {
                let randomTemp = Math.floor(Math.random() * 250) + 1;
                rankDiv.innerText = `الترتيب: #${randomTemp}`;
                resultDiv.innerText = "جاري السحب... 🍿";
                resultDiv.style.transform = `scale(${Math.random() * 0.1 + 0.95})`;
                playTick();
                clicks++;
                
                if (clicks > duration) {
                    clearInterval(interval);
                    
                    let randomIndex = Math.floor(Math.random() * movieTitles.length);
                    let finalMovie = movieTitles[randomIndex];
                    
                    movieTitles.splice(randomIndex, 1);
                    
                    rankDiv.innerText = `الترتيب الرسمي في IMDb: #${finalMovie.rank}`;
                    resultDiv.innerText = finalMovie.name;
                    resultDiv.style.transform = "scale(1.1)";
                    counterSpan.innerText = movieTitles.length;
                    
                    playWin();
                    spawnParticles();
                    mainCard.style.transform = "scale(1.02)";
                    setTimeout(() => mainCard.style.transform = "scale(1)", 300);

                    let searchUrl = `https://iwaatch.com/search/${encodeURIComponent(finalMovie.name)}`;
                    watchLink.href = searchUrl;
